name: Generate Legal Blog Post

on:
  schedule:
    # Run every 21 days at 9:00 AM UTC
    - cron: '0 9 */7 * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Force generation even if not due'
        required: false
        default: 'false'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install feedparser mistralai
      
      - name: Run summarizer
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          cd scripts
          python generate_blog.py
      
      - name: Check if changes were made
        id: check_changes
        run: |
          if git diff --quiet src/data/blogPosts.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/blogPosts.json
          git commit -m "Auto-generate blog post: $(date +'%Y-%m-%d')"
          git push
      
      - name: Upload summary artifact
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-summary
          path: src/data/blogPosts.json
          retention-days: 30
      
      - name: No changes
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No new blog post generated (may not be due yet)"
